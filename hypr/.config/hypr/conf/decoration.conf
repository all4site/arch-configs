# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1 
    inactive_opacity = 1 

    shadow {
        enabled = true
        range = 4
        render_power = 3
        # color = rgba(1a1a1aee)
        color = rgba(af8d8bff)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = false 
        size = 60 
        passes = 4
        # vibrancy = 0.1696
        vibrancy = 0.3 
    }
}

